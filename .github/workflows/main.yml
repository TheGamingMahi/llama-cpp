name: Build llama-cpp-python CUDA Wheel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python 3.12 & dependencies
        run: |
          apt-get update
          apt-get install -y gnupg curl ca-certificates cmake ninja-build build-essential git
          # Manually add deadsnakes PPA (add-apt-repository is unreliable in containers)
          curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xF23C5A6CF475977595C89F51BA6932366A755776" \
            | gpg --dearmor -o /etc/apt/trusted.gpg.d/deadsnakes.gpg
          echo "deb https://ppa.launchpadcontent.net/deadsnakes/ppa/ubuntu jammy main" \
            > /etc/apt/sources.list.d/deadsnakes.list
          apt-get update
          apt-get install -y python3.12 python3.12-dev python3.12-venv python3.12-distutils
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install --upgrade pip setuptools wheel

      - name: Build llama-cpp-python wheel with CUDA
        env:
          CMAKE_ARGS: "-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=75"
          FORCE_CMAKE: "1"
        run: |
          python3.12 -m pip wheel llama-cpp-python==0.3.16 \
            --wheel-dir /wheels \
            --verbose

      - name: List built wheels
        run: ls -lh /wheels/

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-cu128-cp312
          path: /wheels/*.whl
          retention-days: 90

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f cu128-cp312
          git push origin cu128-cp312 --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cu128-cp312
          name: "llama-cpp-python CUDA 12.8 Python 3.12"
          files: /wheels/*.whl
          body: |
            Prebuilt llama-cpp-python wheel for:
            - Python 3.12 (cp312)
            - CUDA 12.8
            - Linux x86_64

            Install with:
            ```
            pip install <url-to-whl-file>
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
