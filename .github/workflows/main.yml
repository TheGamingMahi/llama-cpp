name: Build CPU Wheel (Fast)

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: abetlen/llama-cpp-python
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          sudo apt install -y \
            libopenblas-dev \
            build-essential \
            cmake \
            patchelf

          pip install build auditwheel

      - name: Build wheel
        run: python -m build --wheel
        env:
          CMAKE_ARGS: >-
            -DGGML_BLAS=ON
            -DGGML_BLAS_VENDOR=OpenBLAS
            -DGGML_AVX=ON
            -DGGML_AVX2=ON
            -DGGML_F16C=ON
            -DGGML_FMA=ON
            -DCMAKE_BUILD_TYPE=Release

      - name: Bundle libs (auditwheel)
        run: auditwheel repair dist/*.whl --wheel-dir dist/fixed/

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cpu-latest
          files: dist/fixed/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
