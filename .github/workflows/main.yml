name: Build CPU Wheel

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: abetlen/llama-cpp-python
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          sudo apt install -y \
            libopenblas-dev \
            build-essential \
            cmake \
            patchelf
          pip install build "auditwheel>=5.0"

      - name: Build wheel
        run: python -m build --wheel
        env:
          CMAKE_ARGS: >-
            -DGGML_BLAS=ON
            -DGGML_BLAS_VENDOR=OpenBLAS
            -DGGML_NATIVE=OFF
            -DGGML_AVX=ON
            -DGGML_AVX2=ON
            -DGGML_F16C=ON
            -DGGML_FMA=ON
            -DCMAKE_BUILD_TYPE=Release

      - name: Bundle libs (auditwheel)
        run: auditwheel repair dist/*.whl --plat manylinux_2_17_x86_64 --wheel-dir dist/fixed/

      - name: Get wheel name
        id: wheel
        run: echo "name=$(ls dist/fixed/*.whl | xargs basename)" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: echo "ver=$(ls dist/fixed/*.whl | grep -oP '\d+\.\d+\.\d+')" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cpu-v${{ steps.version.outputs.ver }}-manylinux2_17
          name: "CPU Build v${{ steps.version.outputs.ver }} (manylinux2_17)"
          body: |
            CPU-only wheel for Python 3.13, Linux x86_64
            Built with OpenBLAS, AVX2, FMA, F16C
            Compatible with HF Spaces free tier (manylinux_2_17)

            Install:
            ```
            pip install https://github.com/TheGamingMahi/llama-cpp/releases/download/cpu-v${{ steps.version.outputs.ver }}-manylinux2_17/${{ steps.wheel.outputs.name }}
            ```
          files: dist/fixed/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
