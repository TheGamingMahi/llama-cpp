name: Build llama-cpp-python CUDA Wheel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl git cmake ninja-build build-essential \
            libssl-dev libffi-dev zlib1g-dev libbz2-dev \
            libreadline-dev libsqlite3-dev liblzma-dev

      - name: Fix libcuda.so.1 stub
        run: |
          ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1
          echo "/usr/local/cuda/lib64/stubs" >> /etc/ld.so.conf.d/cuda-stubs.conf
          ldconfig

      - name: Install Python 3.12 via pyenv
        run: |
          curl https://pyenv.run | bash
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init -)"
          pyenv install 3.12.9
          pyenv global 3.12.9
          python --version
          python -m pip install --upgrade pip setuptools wheel
          ln -s "$PYENV_ROOT/shims/python" /usr/local/bin/python3.12

      - name: Build llama-cpp-python wheel with CUDA
        env:
          PYENV_ROOT: "/root/.pyenv"
          PATH: "/usr/local/cuda/bin:/root/.pyenv/shims:/root/.pyenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          CMAKE_ARGS: "-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=75 -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc"
          FORCE_CMAKE: "1"
          LDFLAGS: "-L/usr/local/cuda/lib64/stubs"
        run: |
          python3.12 -m pip wheel llama-cpp-python==0.3.16 \
            --wheel-dir /wheels \
            --verbose

      - name: List built wheels
        run: ls -lh /wheels/

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-cu128-cp312
          path: /wheels/*.whl
          retention-days: 90

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f cu128-cp312
          git push origin cu128-cp312 --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cu128-cp312
          name: "llama-cpp-python CUDA 12.8 Python 3.12"
          files: /wheels/*.whl
          body: |
            Prebuilt llama-cpp-python wheel for:
            - Python 3.12 (cp312)
            - CUDA 12.8
            - Linux x86_64

            Install with:
            ```
            pip install <url-to-whl-file>
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
